services:
  - type: web
    name: railalert
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: db
      mountPath: /app/backend
      sizeGB: 1
